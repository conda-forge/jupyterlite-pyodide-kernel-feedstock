# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.2"
  jupyterlab_min: "4.6.0"
  jupyterlab_max: "4.7.0"
  jupyterlite_core_min: "0.8.1"
  jupyterlite_core_max: "0.9.0"
  python_min_lock: "3.12"
  python_check_max: "3.14"
  # derived
  js_version: ${{ version | replace("a", "-alpha.") | replace("b", "-beta.") | replace("rc", "-rc.") }}

recipe:
  name: jupyterlite-pyodide-kernel-split
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyterlite-pyodide-kernel/jupyterlite_pyodide_kernel-${{ version }}.tar.gz
  sha256: 2fdbe6ec5e024dac08f2bd1b5199e1c0fa770851a1895949586ae1c9d2e85636

build:
  number: 0
  noarch: python

outputs:
  - package:
      name: jupyterlite-pyodide-kernel
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
      python:
        entry_points:
          - jupyter-piplite = jupyterlite_pyodide_kernel.app:main
    requirements:
      host:
        - hatchling >=1.4.0
        - jupyterlab ${{ jupyterlab_min }}.*
        - pip
        - python ${{ python_min }}.*
      run:
        - jupyterlite-core >=${{ jupyterlite_core_min }}
        - pkginfo
        - python >=${{ python_min }}
    tests:
      - python:
          imports: jupyterlite_pyodide_kernel
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*
      - requirements:
          run:
            - jupyterlab ${{ jupyterlab_min }}.*
            - jupyterlite-core ${{ jupyterlite_core_min }}.*
            - python ${{ python_min }}.*
        script:
          - jupyter piplite --version
          - jupyter-piplite --help
          - jupyter labextension list
          - jupyter labextension list 2>&1 | python -c "import re, sys; assert re.search(r'@jupyterlite/pyodide-kernel-extension.*v${{ js_version | replace(".", "\\.") }}.*OK', sys.stdin.read())"
          - jupyter lite build
          - python -c "from pathlib import Path; assert b'pyodide-kernel-extension' in Path('_output/jupyter-lite.json').read_bytes()"

  - package:
      name: jupyterlite-pyodide-kernel-with-lock
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage("jupyterlite-pyodide-kernel", exact=True) }}
        - pyodide-lock-with-uv >=0.1.3,<0.2.0
    tests:
      - python:
          imports: jupyterlite_pyodide_kernel
          pip_check: true
          python_version:
            - ${{ python_min_lock }}.*
            - ${{ python_check_max }}.*
      - files:
          source:
            - pyproject.toml
        requirements:
          run:
            - pytest-console-scripts
            - pytest-cov <7
            - pytest-html
            - python ${{ python_min_lock }}.*
        script:
          - pytest -k "not test_validate_config" --cov-fail-under=93
    about:
      summary: Python kernel for JupyterLite powered by Pyodide (with [lock])

about:
  summary: Python kernel for JupyterLite powered by Pyodide
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyterlite_pyodide_kernel/labextension/static/third-party-licenses.json
  homepage: https://github.com/jupyterlite/pyodide-kernel
  documentation: https://jupyterlite-pyodide-kernel.rtfd.io

extra:
  feedstock-name: jupyterlite-pyodide-kernel
  recipe-maintainers:
    - agriyakhetarpal
    - bollwyvl
    - jtpio
    - martinRenou
